<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abyssal Tides</title>
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0a1628;
  --bg-mid: #0f2035;
  --bg-card: #132a42;
  --bg-card-hover: #183450;
  --border: #1e3a5f;
  --text: #e0e8f0;
  --text-dim: #7a9bb5;
  --accent: #3b9eff;
  --accent-glow: rgba(59, 158, 255, 0.3);
  --success: #2ecc71;
  --warning: #f39c12;
  --danger: #e74c3c;
  /* Rarity colors */
  --common: #9ca3af;
  --uncommon: #4ade80;
  --rare: #60a5fa;
  --epic: #c084fc;
  --legendary: #fbbf24;
  --junk: #ef4444;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ========== OCEAN BACKGROUND ========== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(15, 50, 80, 0.8) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(10, 40, 90, 0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 60%, rgba(5, 30, 70, 0.3) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ========== LAYOUT ========== */
.game-container {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100vh;
}

/* ========== HEADER ========== */
.header {
  text-align: center;
  padding: 20px 0 12px;
}

.header h1 {
  font-size: 2rem;
  font-weight: 700;
  background: linear-gradient(135deg, #60a5fa, #3b82f6, #2dd4bf);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}

.header .subtitle {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 2px;
}

/* ========== STATUS BAR ========== */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 18px;
  margin: 12px 0;
  gap: 12px;
  flex-wrap: wrap;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.9rem;
}

.status-item .label {
  color: var(--text-dim);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-item .value {
  font-weight: 600;
  font-size: 1.05rem;
}

.money-value { color: var(--success); }
.rod-value { color: var(--accent); }
.inv-value { color: var(--text); }
.inv-full { color: var(--danger); animation: pulse 1s ease infinite; }

/* ========== TAB NAVIGATION ========== */
.tab-nav {
  display: flex;
  gap: 4px;
  background: var(--bg-card);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}

.tab-btn {
  flex: 1;
  padding: 10px 8px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.9rem;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.tab-btn:hover { background: var(--bg-card-hover); color: var(--text); }

.tab-btn.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px var(--accent-glow);
}

/* ========== PANELS ========== */
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn 0.25s ease; }

.panel-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 14px;
}

.panel-card h2 {
  font-size: 1.1rem;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ========== OCEAN PANEL ========== */
.cast-btn {
  width: 100%;
  padding: 18px;
  font-size: 1.2rem;
  font-weight: 700;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: #fff;
  box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.cast-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
}

.cast-btn:active:not(:disabled) { transform: translateY(0); }

.cast-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.cast-btn.casting {
  animation: castPulse 0.8s ease;
}

.catch-display {
  min-height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 16px 0;
}

.catch-result {
  text-align: center;
  animation: catchPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.catch-result .fish-emoji {
  font-size: 3rem;
  display: block;
  margin-bottom: 6px;
}

.catch-result .fish-name {
  font-size: 1.2rem;
  font-weight: 700;
}

.catch-result .fish-value {
  font-size: 0.9rem;
  color: var(--success);
  margin-top: 2px;
}

.catch-result .rare-label {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

/* Rarity text colors */
.rarity-common { color: var(--common); }
.rarity-uncommon { color: var(--uncommon); }
.rarity-rare { color: var(--rare); }
.rarity-epic { color: var(--epic); }
.rarity-legendary { color: var(--legendary); }
.rarity-junk { color: var(--junk); }

/* Legendary glow effect */
.catch-result.legendary-catch {
  animation: catchPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), legendaryGlow 1.5s ease infinite;
}

.catch-result.epic-catch .fish-emoji {
  filter: drop-shadow(0 0 12px var(--epic));
}

.catch-result.legendary-catch .fish-emoji {
  filter: drop-shadow(0 0 16px var(--legendary));
  animation: floatBob 2s ease-in-out infinite;
}

/* Best catch */
.best-catch {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: rgba(251, 191, 36, 0.08);
  border: 1px solid rgba(251, 191, 36, 0.2);
  border-radius: 10px;
  font-size: 0.85rem;
  margin-top: 12px;
}

.best-catch .trophy { font-size: 1.2rem; }

/* ========== RECENT CATCHES ========== */
.recent-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.recent-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--bg-mid);
  border-radius: 8px;
  font-size: 0.85rem;
  animation: slideIn 0.3s ease;
}

.recent-item .fish-info {
  display: flex;
  align-items: center;
  gap: 8px;
}

.recent-item .fish-price {
  color: var(--success);
  font-weight: 600;
}

/* ========== TRADER PANEL ========== */
.sell-btn {
  width: 100%;
  padding: 16px;
  font-size: 1.1rem;
  font-weight: 700;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(135deg, #059669, #047857);
  color: #fff;
  box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3);
  transition: all 0.2s;
}

.sell-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(5, 150, 105, 0.4);
}

.sell-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.sale-summary {
  margin-top: 16px;
  padding: 16px;
  background: rgba(5, 150, 105, 0.1);
  border: 1px solid rgba(5, 150, 105, 0.2);
  border-radius: 10px;
  text-align: center;
  animation: fadeIn 0.3s ease;
}

.sale-summary .sale-total {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--success);
}

.sale-breakdown {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sale-breakdown-item {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  color: var(--text-dim);
}

/* Inventory summary in trader */
.inv-summary {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.inv-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  background: var(--bg-mid);
  border-radius: 8px;
  font-size: 0.85rem;
}

.inv-row .count { font-weight: 600; color: var(--text-dim); }
.inv-row .total-val { color: var(--success); font-weight: 600; }

/* ========== ROD SHOP ========== */
.rod-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.rod-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: var(--bg-mid);
  border: 2px solid transparent;
  border-radius: 12px;
  transition: all 0.2s;
}

.rod-item.equipped {
  border-color: var(--accent);
  background: rgba(59, 158, 255, 0.08);
}

.rod-item.owned {
  border-color: var(--border);
}

.rod-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.rod-icon {
  font-size: 1.6rem;
  width: 40px;
  text-align: center;
}

.rod-details h3 {
  font-size: 0.95rem;
  font-weight: 600;
}

.rod-details .rod-desc {
  font-size: 0.78rem;
  color: var(--text-dim);
  margin-top: 2px;
}

.rod-action-btn {
  padding: 8px 18px;
  border: none;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.rod-action-btn.buy {
  background: var(--accent);
  color: #fff;
}

.rod-action-btn.buy:hover:not(:disabled) { filter: brightness(1.1); }
.rod-action-btn.buy:disabled { opacity: 0.4; cursor: not-allowed; }

.rod-action-btn.equipped-label {
  background: rgba(59, 158, 255, 0.15);
  color: var(--accent);
  cursor: default;
}

.rod-action-btn.owned-label {
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
  cursor: pointer;
}

.rod-action-btn.owned-label:hover { background: rgba(255,255,255,0.1); }

/* ========== CACHE PANEL ========== */
.cache-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.cache-header h2 { margin-bottom: 0; }

.cache-count {
  font-size: 0.85rem;
  color: var(--text-dim);
  font-weight: 600;
}

.cache-count .current { color: var(--warning); }

.cache-section-label {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 8px;
  margin-top: 16px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.cache-section-label:first-child { margin-top: 0; }

.cache-fish-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.cache-fish-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--bg-mid);
  border-radius: 8px;
  font-size: 0.85rem;
  animation: slideIn 0.3s ease;
}

.cache-fish-item .fish-info {
  display: flex;
  align-items: center;
  gap: 8px;
}

.cache-fish-item .fish-price {
  color: var(--success);
  font-weight: 600;
  margin-right: 10px;
}

.cache-move-btn {
  padding: 5px 12px;
  border: none;
  border-radius: 6px;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.cache-move-btn.to-cache {
  background: rgba(251, 191, 36, 0.15);
  color: var(--warning);
}

.cache-move-btn.to-cache:hover { background: rgba(251, 191, 36, 0.25); }

.cache-move-btn.to-cache:disabled { opacity: 0.4; cursor: not-allowed; }

.cache-move-btn.to-inv {
  background: rgba(59, 158, 255, 0.15);
  color: var(--accent);
}

.cache-move-btn.to-inv:hover { background: rgba(59, 158, 255, 0.25); }

.cache-move-btn.to-inv:disabled { opacity: 0.4; cursor: not-allowed; }

.cache-empty {
  color: var(--text-dim);
  font-size: 0.85rem;
  text-align: center;
  padding: 12px;
}

.cache-protected-badge {
  display: inline-block;
  font-size: 0.7rem;
  padding: 2px 6px;
  background: rgba(251, 191, 36, 0.12);
  border: 1px solid rgba(251, 191, 36, 0.25);
  border-radius: 4px;
  color: var(--warning);
  margin-left: 6px;
}

/* ========== DOLPHIN FINE MODAL ========== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}

.modal-box {
  background: var(--bg-card);
  border: 2px solid var(--danger);
  border-radius: 16px;
  padding: 32px;
  max-width: 380px;
  text-align: center;
  box-shadow: 0 12px 40px rgba(231, 76, 60, 0.3);
  animation: catchPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.modal-box .modal-emoji { font-size: 3.5rem; display: block; margin-bottom: 12px; }
.modal-box .modal-title { font-size: 1.2rem; font-weight: 700; color: var(--danger); margin-bottom: 8px; }
.modal-box .modal-text { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
.modal-box .modal-fine { font-size: 1.4rem; font-weight: 700; color: var(--danger); margin-bottom: 20px; }

.modal-btn {
  padding: 10px 28px;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  background: var(--danger);
  color: #fff;
  transition: all 0.2s;
}

.modal-btn:hover { filter: brightness(1.15); }

/* ========== INVENTORY FULL WARNING ========== */
.inv-warning {
  background: rgba(231, 76, 60, 0.12);
  border: 1px solid rgba(231, 76, 60, 0.3);
  border-radius: 10px;
  padding: 12px 16px;
  text-align: center;
  color: var(--danger);
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 12px;
  animation: pulse 2s ease infinite;
}

/* ========== TOAST ========== */
.toast-container {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  padding: 10px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
  white-space: nowrap;
}

/* ========== ANIMATIONS ========== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes catchPop {
  0% { opacity: 0; transform: scale(0.5) translateY(20px); }
  60% { transform: scale(1.08) translateY(-4px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

@keyframes legendaryGlow {
  0%, 100% { filter: drop-shadow(0 0 8px var(--legendary)); }
  50% { filter: drop-shadow(0 0 24px var(--legendary)) drop-shadow(0 0 48px rgba(251,191,36,0.3)); }
}

@keyframes floatBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

@keyframes castPulse {
  0% { transform: scale(1); }
  30% { transform: scale(0.96); }
  60% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; transform: translateY(-10px); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}

.shake { animation: shake 0.4s ease; }

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ========== RESPONSIVE ========== */
@media (max-width: 480px) {
  .status-bar { flex-direction: column; align-items: flex-start; gap: 8px; padding: 10px 14px; }
  .panel-card { padding: 16px; }
}
</style>
</head>
<body>

<div class="game-container">
  <!-- Header -->
  <div class="header">
    <h1>Abyssal Tides</h1>
    <div class="subtitle">What lurks beneath the waves?</div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-item">
      <div>
        <div class="label">Money</div>
        <div class="value money-value" id="money-display">$0</div>
      </div>
    </div>
    <div class="status-item">
      <div>
        <div class="label">Rod</div>
        <div class="value rod-value" id="rod-display">Wooden Rod</div>
      </div>
    </div>
    <div class="status-item">
      <div>
        <div class="label">Inventory</div>
        <div class="value inv-value" id="inv-display">0 / 100</div>
      </div>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="ocean">Ocean</button>
    <button class="tab-btn" data-tab="trader">Trader</button>
    <button class="tab-btn" data-tab="shop">Rod Shop</button>
    <button class="tab-btn" data-tab="cache">Cache</button>
  </div>

  <!-- ======== OCEAN PANEL ======== -->
  <div class="tab-panel active" id="panel-ocean">
    <div class="panel-card">
      <div id="inv-warning-ocean"></div>
      <button class="cast-btn" id="cast-btn">Cast Line</button>
      <div class="catch-display" id="catch-display">
        <div style="color: var(--text-dim); font-size: 0.95rem;">Cast your line to start fishing!</div>
      </div>
      <div id="best-catch-display"></div>
    </div>

    <div class="panel-card">
      <h2>Recent Catches</h2>
      <div class="recent-list" id="recent-list">
        <div style="color: var(--text-dim); font-size: 0.85rem; text-align: center; padding: 12px;">No catches yet</div>
      </div>
    </div>
  </div>

  <!-- ======== TRADER PANEL ======== -->
  <div class="tab-panel" id="panel-trader">
    <div class="panel-card">
      <h2>Inventory</h2>
      <div class="inv-summary" id="inv-summary">
        <div style="color: var(--text-dim); font-size: 0.85rem; text-align: center; padding: 8px;">Inventory is empty</div>
      </div>
    </div>
    <div class="panel-card">
      <h2>Sell Fish</h2>
      <button class="sell-btn" id="sell-btn" disabled>Sell All Fish</button>
      <div id="sale-summary"></div>
    </div>
  </div>

  <!-- ======== ROD SHOP PANEL ======== -->
  <div class="tab-panel" id="panel-shop">
    <div class="panel-card">
      <h2>Rod Shop</h2>
      <div class="rod-list" id="rod-list"></div>
    </div>
  </div>

  <!-- ======== CACHE PANEL ======== -->
  <div class="tab-panel" id="panel-cache">
    <div class="panel-card">
      <div class="cache-header">
        <h2>Fish Cache</h2>
        <div class="cache-count"><span class="current" id="cache-count">0</span> / 10 <span class="cache-protected-badge">Protected</span></div>
      </div>
      <p style="color: var(--text-dim); font-size: 0.82rem; margin-bottom: 16px;">
        Store up to 10 prized fish here. Cached fish are never sold.
      </p>
      <div id="cache-content"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
// ================================================================
// GAME DATA
// ================================================================

/** Fish definitions — weight is the base probability weight */
const FISH = [
  { id: 0,  name: 'Common Minnow',    emoji: '🐟', value: 5,    rarity: 'common',    weight: 1000 },
  { id: 1,  name: 'Bluegill',          emoji: '🐠', value: 10,   rarity: 'uncommon',  weight: 500  },
  { id: 2,  name: 'Bass',              emoji: '🐡', value: 25,   rarity: 'uncommon',  weight: 300  },
  { id: 3,  name: 'Salmon',            emoji: '🍣', value: 50,   rarity: 'rare',      weight: 150  },
  { id: 4,  name: 'Tuna',              emoji: '🐟', value: 100,  rarity: 'rare',      weight: 80   },
  { id: 5,  name: 'Swordfish',         emoji: '🗡️', value: 250,  rarity: 'rare',      weight: 35   },
  { id: 6,  name: 'Electric Eel',      emoji: '⚡', value: 500,  rarity: 'epic',      weight: 15   },
  { id: 7,  name: 'Lava Fish',         emoji: '🔥', value: 1000, rarity: 'epic',      weight: 6    },
  { id: 8,  name: 'Crystal Shark',     emoji: '💎', value: 2500,  rarity: 'legendary', weight: 2    },
  { id: 9,  name: 'Mythic Leviathan',  emoji: '🐉', value: 5000,  rarity: 'legendary', weight: 0.5  },
  { id: 10, name: 'Abyssal Kraken',    emoji: '🦑', value: 35000, rarity: 'legendary', weight: 0.1  },
  { id: 11, name: 'Celestial Whale',   emoji: '🐋', value: 50000, rarity: 'legendary', weight: 0.03 },
  // Junk / special catches — not added to inventory
  { id: 12, name: 'Old Shoe',          emoji: '👟', value: -50,   rarity: 'junk', weight: 40, junk: true },
  { id: 13, name: 'Horseshoe',         emoji: '🧲', value: 0,     rarity: 'junk', weight: 60, junk: true },
  { id: 14, name: 'Dolphin',           emoji: '🐬', value: -1000, rarity: 'junk', weight: 3,  junk: true, dolphin: true },
];

/** Rod definitions — rarityBoost multiplies weights of fish index 3+ (rarer fish) */
const RODS = [
  { id: 0, name: 'Wooden Rod',   icon: '🪵', price: 0,     rarityBoost: 1,    desc: 'A humble start' },
  { id: 1, name: 'Iron Rod',     icon: '⛏️', price: 100,   rarityBoost: 1.5,  desc: 'Slightly better odds' },
  { id: 2, name: 'Gold Rod',     icon: '✨', price: 500,   rarityBoost: 2.5,  desc: 'Rare fish appear more' },
  { id: 3, name: 'Diamond Rod',  icon: '💠', price: 2500,  rarityBoost: 5,    desc: 'Epic catches await' },
  { id: 4, name: 'Platinum Rod', icon: '👑', price: 10000,   rarityBoost: 10,   desc: 'Legends of the deep' },
  { id: 5, name: 'Mythril Rod',  icon: '🔱', price: 100000,  rarityBoost: 25,   desc: 'The abyss calls back' },
  { id: 6, name: 'Celestial Rod', icon: '🌟', price: 1000000, rarityBoost: 60,  desc: 'Fish beyond the stars' },
];

const MAX_INVENTORY = 100;
const CAST_COOLDOWN = 800; // ms
const RARITY_ORDER = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
const RARITY_LABELS = {
  common: 'Common', uncommon: 'Uncommon', rare: 'Rare', epic: 'Epic', legendary: 'Legendary'
};

// ================================================================
// GAME STATE
// ================================================================

const MAX_CACHE = 10;

let state = {
  money: 0,
  inventory: [],       // array of fish IDs
  cache: [],           // array of fish IDs (max 10, protected from selling)
  equippedRod: 0,
  ownedRods: [0],      // array of rod IDs
  bestCatchId: -1,     // fish ID of best catch
  recentCatches: [],   // last 8 fish IDs (newest first)
};

let isCasting = false;

// ================================================================
// AUDIO — Web Audio API (no external files)
// ================================================================

let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

/** Play a short tone. Higher rarity = higher pitch + longer sustain */
function playCatchSound(rarity) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    const pitchMap = { common: 440, uncommon: 523, rare: 659, epic: 784, legendary: 988 };
    const durationMap = { common: 0.1, uncommon: 0.12, rare: 0.15, epic: 0.2, legendary: 0.35 };
    const freq = pitchMap[rarity] || 440;
    const dur = durationMap[rarity] || 0.1;

    osc.type = rarity === 'legendary' ? 'sine' : rarity === 'epic' ? 'triangle' : 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);

    if (rarity === 'legendary') {
      // Ascending arpeggio for legendary
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      osc.frequency.setValueAtTime(freq * 1.25, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(freq * 1.5, ctx.currentTime + 0.2);
    }

    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur + 0.05);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur + 0.1);
  } catch (e) {
    // Audio not supported — silent fail
  }
}

function playSellSound() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.setValueAtTime(800, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.25);
  } catch (e) {}
}

// ================================================================
// WEIGHTED RANDOM FISHING
// ================================================================

/**
 * Get adjusted weights based on the equipped rod.
 * Rod's rarityBoost multiplies weights for fish at index 3+ (Salmon and above),
 * but NOT junk items — junk weights stay fixed.
 * Dolphin only appears if net worth >= $1000.
 */
function getAdjustedWeights() {
  const rod = RODS[state.equippedRod];
  const netWorth = getNetWorth();
  return FISH.map((fish, i) => {
    // Dolphin requires net worth >= 1000
    if (fish.dolphin && netWorth < 1000) return 0;
    // Junk items are not boosted by rods
    if (fish.junk) return fish.weight;
    if (i >= 3) return fish.weight * rod.rarityBoost;
    return fish.weight;
  });
}

/** Calculate player's net worth (money + inventory value + cache value) */
function getNetWorth() {
  const invValue = state.inventory.reduce((sum, id) => sum + FISH[id].value, 0);
  const cacheValue = state.cache.reduce((sum, id) => sum + FISH[id].value, 0);
  return state.money + invValue + cacheValue;
}

/** Pick a random fish using weighted probability */
function catchFish() {
  const weights = getAdjustedWeights();
  const totalWeight = weights.reduce((sum, w) => sum + w, 0);
  let roll = Math.random() * totalWeight;

  for (let i = 0; i < FISH.length; i++) {
    roll -= weights[i];
    if (roll <= 0) return FISH[i];
  }
  return FISH[0]; // fallback
}

// ================================================================
// GAME ACTIONS
// ================================================================

function doCast() {
  if (isCasting) return;
  if (state.inventory.length >= MAX_INVENTORY) {
    showToast('Inventory full! Sell fish at the Trader.');
    const btn = document.getElementById('cast-btn');
    btn.classList.add('shake');
    setTimeout(() => btn.classList.remove('shake'), 400);
    return;
  }

  isCasting = true;
  const btn = document.getElementById('cast-btn');
  btn.disabled = true;
  btn.classList.add('casting');
  btn.textContent = 'Casting...';

  setTimeout(() => {
    const fish = catchFish();

    if (fish.junk) {
      // Junk items: don't add to inventory, apply money effect immediately
      if (fish.dolphin) {
        // Dolphin: show fine modal
        state.money = Math.max(0, state.money - 1000);
        showDolphinModal();
      } else if (fish.value < 0) {
        // Old Shoe: lose money
        state.money = Math.max(0, state.money + fish.value);
        showToast(`${fish.emoji} You fished up an Old Shoe! -$${Math.abs(fish.value)}`);
      } else {
        // Horseshoe: $0
        showToast(`${fish.emoji} You fished up a Horseshoe! Worth nothing.`);
      }
      playCatchSound('common');
      displayCatch(fish);
    } else {
      // Normal fish: add to inventory
      state.inventory.push(fish.id);

      // Track best catch
      if (state.bestCatchId === -1 || fish.id > state.bestCatchId) {
        state.bestCatchId = fish.id;
      }

      playCatchSound(fish.rarity);
      displayCatch(fish);
    }

    // Track recent catches for all types
    state.recentCatches.unshift(fish.id);
    if (state.recentCatches.length > 8) state.recentCatches.pop();

    updateUI();
    saveGame();

    // Reset button
    btn.classList.remove('casting');
    btn.textContent = 'Cast Line';
    btn.disabled = false;
    isCasting = false;
  }, CAST_COOLDOWN);
}

function doSell() {
  if (state.inventory.length === 0) return;

  // Calculate totals by fish type
  const counts = {};
  let totalEarnings = 0;

  state.inventory.forEach(fishId => {
    const fish = FISH[fishId];
    counts[fishId] = (counts[fishId] || 0) + 1;
    totalEarnings += fish.value;
  });

  state.money += totalEarnings;
  state.inventory = [];
  state.recentCatches = [];

  playSellSound();

  // Show sale summary
  const summaryEl = document.getElementById('sale-summary');
  let breakdownHTML = '';
  Object.entries(counts)
    .sort((a, b) => Number(b[0]) - Number(a[0]))
    .forEach(([fishId, count]) => {
      const fish = FISH[fishId];
      breakdownHTML += `
        <div class="sale-breakdown-item">
          <span>${fish.emoji} ${fish.name} x${count}</span>
          <span class="money-value">$${(fish.value * count).toLocaleString()}</span>
        </div>`;
    });

  summaryEl.innerHTML = `
    <div class="sale-summary">
      <div style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 4px;">Fish Sold!</div>
      <div class="sale-total">+$${totalEarnings.toLocaleString()}</div>
      <div class="sale-breakdown">${breakdownHTML}</div>
    </div>`;

  showToast(`Sold fish for $${totalEarnings.toLocaleString()}!`);
  updateUI();
  saveGame();
}

function buyRod(rodId) {
  const rod = RODS[rodId];
  if (state.ownedRods.includes(rodId)) {
    // Equip it
    state.equippedRod = rodId;
  } else if (state.money >= rod.price) {
    state.money -= rod.price;
    state.ownedRods.push(rodId);
    state.equippedRod = rodId;
    showToast(`Purchased ${rod.name}!`);
  }
  updateUI();
  saveGame();
}

// ================================================================
// CACHE ACTIONS
// ================================================================

/** Move one fish from inventory to cache by its inventory index */
function moveToCache(invIndex) {
  if (state.cache.length >= MAX_CACHE) {
    showToast('Cache is full! (10/10)');
    return;
  }
  if (invIndex < 0 || invIndex >= state.inventory.length) return;
  const fishId = state.inventory.splice(invIndex, 1)[0];
  state.cache.push(fishId);
  showToast(`Cached ${FISH[fishId].emoji} ${FISH[fishId].name}`);
  updateUI();
  saveGame();
}

/** Move one fish from cache back to inventory by its cache index */
function moveToInventory(cacheIndex) {
  if (state.inventory.length >= MAX_INVENTORY) {
    showToast('Inventory full! Sell fish first.');
    return;
  }
  if (cacheIndex < 0 || cacheIndex >= state.cache.length) return;
  const fishId = state.cache.splice(cacheIndex, 1)[0];
  state.inventory.push(fishId);
  showToast(`Returned ${FISH[fishId].emoji} ${FISH[fishId].name} to inventory`);
  updateUI();
  saveGame();
}

// ================================================================
// UI RENDERING
// ================================================================

function displayCatch(fish) {
  const container = document.getElementById('catch-display');
  const isEpic = fish.rarity === 'epic';
  const isLegendary = fish.rarity === 'legendary';
  const isJunk = fish.rarity === 'junk';
  const extraClass = isLegendary ? 'legendary-catch' : isEpic ? 'epic-catch' : isJunk ? 'shake' : '';

  let labelHTML = '';
  if (isEpic || isLegendary) {
    const prefix = isLegendary ? '✨ LEGENDARY CATCH!' : '⚡ EPIC CATCH!';
    labelHTML = `<div class="rare-label rarity-${fish.rarity}">${prefix}</div>`;
  } else if (isJunk) {
    labelHTML = `<div class="rare-label rarity-junk">Junk</div>`;
  }

  // Format value display
  let valueHTML;
  if (fish.value < 0) {
    valueHTML = `<span style="color: var(--danger);">-$${Math.abs(fish.value).toLocaleString()}</span>`;
  } else if (fish.value === 0) {
    valueHTML = `<span style="color: var(--text-dim);">$0</span>`;
  } else {
    valueHTML = `$${fish.value.toLocaleString()}`;
  }

  container.innerHTML = `
    <div class="catch-result ${extraClass}">
      ${labelHTML}
      <span class="fish-emoji">${fish.emoji}</span>
      <div class="fish-name rarity-${fish.rarity}">${fish.name}</div>
      <div class="fish-value">${valueHTML}</div>
    </div>`;
}

/** Show the dolphin fine modal */
function showDolphinModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <span class="modal-emoji">🐬</span>
      <div class="modal-title">You caught a Dolphin!</div>
      <div class="modal-text">Due to marine wildlife regulations, catching dolphins is strictly prohibited.</div>
      <div class="modal-fine">Fine: -$1,000</div>
      <button class="modal-btn" id="modal-dismiss-btn">Pay Fine</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('modal-dismiss-btn').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

function updateUI() {
  // Money
  document.getElementById('money-display').textContent = `$${state.money.toLocaleString()}`;

  // Rod
  document.getElementById('rod-display').textContent = RODS[state.equippedRod].name;

  // Inventory count
  const invDisplay = document.getElementById('inv-display');
  const invCount = state.inventory.length;
  invDisplay.textContent = `${invCount} / ${MAX_INVENTORY}`;
  invDisplay.className = `value ${invCount >= MAX_INVENTORY ? 'inv-full' : 'inv-value'}`;

  // Inventory full warning on ocean panel
  const warningEl = document.getElementById('inv-warning-ocean');
  if (invCount >= MAX_INVENTORY) {
    warningEl.innerHTML = '<div class="inv-warning">Inventory full! Visit the Trader to sell.</div>';
  } else {
    warningEl.innerHTML = '';
  }

  // Recent catches
  const recentEl = document.getElementById('recent-list');
  if (state.recentCatches.length === 0) {
    recentEl.innerHTML = '<div style="color: var(--text-dim); font-size: 0.85rem; text-align: center; padding: 12px;">No catches yet</div>';
  } else {
    recentEl.innerHTML = state.recentCatches.map(fishId => {
      const fish = FISH[fishId];
      return `
        <div class="recent-item">
          <div class="fish-info">
            <span>${fish.emoji}</span>
            <span class="rarity-${fish.rarity}">${fish.name}</span>
          </div>
          <span class="fish-price">$${fish.value.toLocaleString()}</span>
        </div>`;
    }).join('');
  }

  // Best catch
  const bestEl = document.getElementById('best-catch-display');
  if (state.bestCatchId >= 0) {
    const best = FISH[state.bestCatchId];
    bestEl.innerHTML = `
      <div class="best-catch">
        <span class="trophy">🏆</span>
        <span>Best Catch: <strong class="rarity-${best.rarity}">${best.emoji} ${best.name}</strong> — $${best.value.toLocaleString()}</span>
      </div>`;
  }

  // Sell button
  const sellBtn = document.getElementById('sell-btn');
  sellBtn.disabled = state.inventory.length === 0;
  sellBtn.textContent = state.inventory.length > 0
    ? `Sell All Fish (${state.inventory.length})`
    : 'Sell All Fish';

  // Trader inventory summary
  updateTraderInventory();

  // Rod shop
  updateRodShop();

  // Cache
  updateCache();
}

function updateTraderInventory() {
  const container = document.getElementById('inv-summary');
  if (state.inventory.length === 0) {
    container.innerHTML = '<div style="color: var(--text-dim); font-size: 0.85rem; text-align: center; padding: 8px;">Inventory is empty</div>';
    return;
  }

  // Count fish by type
  const counts = {};
  state.inventory.forEach(fishId => {
    counts[fishId] = (counts[fishId] || 0) + 1;
  });

  const totalValue = state.inventory.reduce((sum, id) => sum + FISH[id].value, 0);

  let html = Object.entries(counts)
    .sort((a, b) => Number(b[0]) - Number(a[0]))
    .map(([fishId, count]) => {
      const fish = FISH[fishId];
      return `
        <div class="inv-row">
          <span>${fish.emoji} <span class="rarity-${fish.rarity}">${fish.name}</span> <span class="count">x${count}</span></span>
          <span class="total-val">$${(fish.value * count).toLocaleString()}</span>
        </div>`;
    }).join('');

  html += `
    <div class="inv-row" style="margin-top: 4px; border-top: 1px solid var(--border); padding-top: 10px;">
      <span style="font-weight: 600;">Total Value</span>
      <span class="total-val" style="font-size: 1rem;">$${totalValue.toLocaleString()}</span>
    </div>`;

  container.innerHTML = html;
}

function updateRodShop() {
  const container = document.getElementById('rod-list');
  container.innerHTML = RODS.map(rod => {
    const isOwned = state.ownedRods.includes(rod.id);
    const isEquipped = state.equippedRod === rod.id;
    const canAfford = state.money >= rod.price;

    let actionHTML;
    if (isEquipped) {
      actionHTML = '<button class="rod-action-btn equipped-label">Equipped</button>';
    } else if (isOwned) {
      actionHTML = `<button class="rod-action-btn owned-label" onclick="buyRod(${rod.id})">Equip</button>`;
    } else {
      actionHTML = `<button class="rod-action-btn buy" ${canAfford ? '' : 'disabled'} onclick="buyRod(${rod.id})">$${rod.price.toLocaleString()}</button>`;
    }

    const itemClass = isEquipped ? 'equipped' : isOwned ? 'owned' : '';
    const boostLabel = rod.rarityBoost > 1 ? `${rod.rarityBoost}x rare boost` : 'No bonus';

    return `
      <div class="rod-item ${itemClass}">
        <div class="rod-info">
          <span class="rod-icon">${rod.icon}</span>
          <div class="rod-details">
            <h3>${rod.name}</h3>
            <div class="rod-desc">${rod.desc} — ${boostLabel}</div>
          </div>
        </div>
        ${actionHTML}
      </div>`;
  }).join('');
}

function updateCache() {
  document.getElementById('cache-count').textContent = state.cache.length;

  const container = document.getElementById('cache-content');
  let html = '';

  // Cached fish section
  html += '<div class="cache-section-label">Cached Fish</div>';
  if (state.cache.length === 0) {
    html += '<div class="cache-empty">No fish cached yet</div>';
  } else {
    html += '<div class="cache-fish-list">';
    state.cache.forEach((fishId, idx) => {
      const fish = FISH[fishId];
      const invFull = state.inventory.length >= MAX_INVENTORY;
      html += `
        <div class="cache-fish-item">
          <div class="fish-info">
            <span>${fish.emoji}</span>
            <span class="rarity-${fish.rarity}">${fish.name}</span>
            <span class="fish-price">$${fish.value.toLocaleString()}</span>
          </div>
          <button class="cache-move-btn to-inv" ${invFull ? 'disabled title="Inventory full"' : ''} onclick="moveToInventory(${idx})">To Inventory</button>
        </div>`;
    });
    html += '</div>';
  }

  // Inventory fish section — fish available to cache
  html += '<div class="cache-section-label">Inventory — Select to Cache</div>';
  if (state.inventory.length === 0) {
    html += '<div class="cache-empty">Inventory is empty</div>';
  } else {
    // Group by fish type with their original indices
    const grouped = {};
    state.inventory.forEach((fishId, idx) => {
      if (!grouped[fishId]) grouped[fishId] = [];
      grouped[fishId].push(idx);
    });

    const cacheFull = state.cache.length >= MAX_CACHE;
    html += '<div class="cache-fish-list">';
    Object.entries(grouped)
      .sort((a, b) => Number(b[0]) - Number(a[0]))
      .forEach(([fishId, indices]) => {
        const fish = FISH[fishId];
        // Show one row per fish type, button caches the last one of that type
        const lastIdx = indices[indices.length - 1];
        html += `
          <div class="cache-fish-item">
            <div class="fish-info">
              <span>${fish.emoji}</span>
              <span class="rarity-${fish.rarity}">${fish.name}</span>
              <span class="count" style="color: var(--text-dim); font-weight: 600;">x${indices.length}</span>
              <span class="fish-price">$${fish.value.toLocaleString()}</span>
            </div>
            <button class="cache-move-btn to-cache" ${cacheFull ? 'disabled title="Cache full"' : ''} onclick="moveToCache(${lastIdx})">Cache 1</button>
          </div>`;
      });
    html += '</div>';
  }

  container.innerHTML = html;
}

// ================================================================
// TAB NAVIGATION
// ================================================================

function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabName);
  });
  document.querySelectorAll('.tab-panel').forEach(panel => {
    panel.classList.toggle('active', panel.id === `panel-${tabName}`);
  });
}

// ================================================================
// TOAST NOTIFICATIONS
// ================================================================

function showToast(msg) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ================================================================
// SAVE / LOAD (localStorage)
// ================================================================

const SAVE_KEY = 'abyssalTidesSave';

function saveGame() {
  const data = {
    money: state.money,
    inventory: state.inventory,
    cache: state.cache,
    equippedRod: state.equippedRod,
    ownedRods: state.ownedRods,
    bestCatchId: state.bestCatchId,
    recentCatches: state.recentCatches,
  };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch (e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    state.money = data.money ?? 0;
    state.inventory = data.inventory ?? [];
    state.cache = data.cache ?? [];
    state.equippedRod = data.equippedRod ?? 0;
    state.ownedRods = data.ownedRods ?? [0];
    state.bestCatchId = data.bestCatchId ?? -1;
    state.recentCatches = data.recentCatches ?? [];
  } catch (e) {
    // Corrupt save — start fresh
  }
}

// ================================================================
// INITIALIZATION
// ================================================================

document.addEventListener('DOMContentLoaded', () => {
  // Load saved game
  loadGame();
  updateUI();

  // Tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // Cast button
  document.getElementById('cast-btn').addEventListener('click', doCast);

  // Sell button
  document.getElementById('sell-btn').addEventListener('click', doSell);

  // Keyboard shortcut — spacebar to cast
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !e.repeat) {
      e.preventDefault();
      doCast();
    }
  });
});
</script>
